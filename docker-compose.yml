services:
  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      CORS_ORIGIN: "http://localhost:5173"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
